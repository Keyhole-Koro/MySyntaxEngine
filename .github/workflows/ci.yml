name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: make
      - name: Run semantic action tests
        run: make test
      - name: Smoke test CLI
        run: ./build/bin/output tests/fixtures/grammars/sample2.txt int id '=' id ';'
